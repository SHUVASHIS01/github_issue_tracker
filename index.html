<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="icon" type="image/png" href="./assets/github-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="min-h-screen text-gray-800">

    <!-- Login View -->
    <div id="login-view" class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-100 p-8 space-y-6">

            <!-- Header -->
            <div class="flex flex-col items-center space-y-2">
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="h-16 w-16 mb-2">
                <h1 class="text-2xl font-bold tracking-tight text-gray-900">GitHub Issues Tracker</h1>
                <p class="text-sm text-gray-500">Sign in to manage your issues</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4 pt-2">
                <div class="space-y-1">
                    <label for="username" class="block text-sm font-semibold text-gray-700">Username</label>
                    <input type="text" id="username" placeholder="Enter Username"
                        class="w-full px-4 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4A00FF] focus:border-transparent transition-colors">
                    <p class="text-xs text-[#4A00FF] font-medium mt-1">Default: admin</p>
                </div>

                <div class="space-y-1">
                    <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                    <input type="password" id="password" placeholder="Enter Password"
                        class="w-full px-4 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4A00FF] focus:border-transparent transition-colors">
                    <p class="text-xs text-[#4A00FF] font-medium mt-1">Default: admin123</p>
                </div>

                <button type="submit"
                    class="w-full py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-[#4A00FF] hover:bg-[#3d00cc] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#4A00FF] transition-colors mt-2">
                    Sign In
                </button>
            </form>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="bg-white px-2 text-gray-400 font-medium">OR</span>
                </div>
            </div>

            <!-- Demo Credentials -->
            <div class="bg-slate-50 rounded-lg p-5 border border-gray-100 flex flex-col items-center">
                <p class="text-xs text-gray-500 mb-3">Demo Credentials:</p>
                <div class="text-sm">
                    <p class="font-medium text-gray-900">Username: <span class="font-normal text-gray-600">admin</span>
                    </p>
                    <p class="font-medium text-gray-900">Password: <span
                            class="font-normal text-gray-600">admin123</span></p>
                </div>
            </div>

        </div>
    </div>

    <!-- Dashboard View (Hidden initially) -->
    <div id="dashboard-view" class="hidden min-h-screen bg-[#f3f4f6]">
        <!-- Navbar -->
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-10 p-4">
            <div class="max-w-[1400px] mx-auto flex items-center justify-between">
                <!-- Logo and Title -->
                <div class="flex items-center space-x-2">
                    <img src="./assets/github-logo.png" alt="Logo" class="h-8 w-8">
                    <span class="font-bold text-gray-900 text-lg">GitHub Issues Tracker</span>
                </div>
                <!-- Search and Button (Desktop hidden on small, responsive later) -->
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" id="search-input" placeholder="Search issues..."
                            class="block w-64 pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:border-[#4A00FF] focus:ring-1 focus:ring-[#4A00FF]">
                    </div>
                    <button
                        class="bg-[#4A00FF] hover:bg-[#3d00cc] text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        + New Issue
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content Container -->
        <main class="max-w-[1400px] mx-auto p-6 md:p-8">
            <!-- Tabs -->
            <div class="flex space-x-2 mb-6">
                <button
                    class="tab-btn active px-6 py-2 rounded border border-transparent bg-[#4A00FF] text-white text-sm font-medium"
                    data-tab="all">All</button>
                <button
                    class="tab-btn px-6 py-2 rounded border border-gray-200 bg-white text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors"
                    data-tab="open">Open</button>
                <button
                    class="tab-btn px-6 py-2 rounded border border-gray-200 bg-white text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors"
                    data-tab="closed">Closed</button>
            </div>

            <!-- Issues List Card Container -->
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <!-- Header Info -->
                <div
                    class="p-6 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div class="flex items-center space-x-4">
                        <div class="bg-[#f0ebff] p-2 rounded-full">
                            <img src="./assets/Aperture.png" alt="Issues Icon" class="h-6 w-6">
                        </div>
                        <div>
                            <h2 class="text-lg font-bold text-gray-900" id="issue-count">0 Issues</h2>
                            <p class="text-sm text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4 text-sm font-medium">
                        <div class="flex items-center text-gray-700">
                            <span class="w-2.5 h-2.5 rounded-full bg-green-500 mr-2"></span> Open
                        </div>
                        <div class="flex items-center text-gray-700">
                            <span class="w-2.5 h-2.5 rounded-full bg-purple-500 mr-2"></span> Closed
                        </div>
                    </div>
                </div>

                <!-- Issues Grid Area -->
                <div class="p-6">
                    <!-- Loading Spinner -->
                    <div id="loading-spinner" class="flex justify-center items-center py-12 hidden">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#4A00FF]"></div>
                    </div>

                    <!-- Grid -->
                    <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <!-- Cards will be injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="issue-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto flex flex-col">
            <div class="p-6">
                <!-- Modal Head -->
                <div class="flex items-start justify-between mb-4">
                    <h2 id="modal-title" class="text-2xl font-bold text-gray-900 leading-tight"></h2>
                </div>

                <div class="flex items-center space-x-2 text-sm text-gray-500 mb-6 flex-wrap gap-y-2">
                    <span id="modal-status"
                        class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Open</span>
                    <span>•</span>
                    <span>Opened by <span id="modal-author" class="font-medium"></span></span>
                    <span>•</span>
                    <span id="modal-date"></span>
                </div>

                <div id="modal-labels" class="flex flex-wrap gap-2 mb-6">
                    <!-- Labels injected here -->
                </div>

                <div class="prose prose-sm max-w-none text-gray-700 mb-8">
                    <p id="modal-description"></p>
                </div>

                <div class="bg-gray-50 rounded-lg p-4 flex flex-wrap gap-4 border border-gray-100 mb-6">
                    <div class="flex-1 min-w-[120px]">
                        <p class="text-xs text-gray-500 mb-1">Assignee:</p>
                        <p id="modal-assignees" class="text-sm font-medium text-gray-900">-</p>
                    </div>
                    <div class="flex-1 min-w-[120px]">
                        <p class="text-xs text-gray-500 mb-1">Priority:</p>
                        <span id="modal-priority"
                            class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-bold inline-block">HIGH</span>
                    </div>
                </div>

                <div class="flex justify-end mt-4 border-t border-gray-100 pt-6">
                    <button id="close-modal"
                        class="px-6 py-2 bg-[#4A00FF] hover:bg-[#3d00cc] text-white rounded-lg text-sm font-medium transition-colors">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>

</html>
